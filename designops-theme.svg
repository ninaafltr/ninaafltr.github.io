<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CE0"/>
      <stop offset="100%" stop-color="#5A3FC0"/>
    </linearGradient>
    <linearGradient id="pinkfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3D8A"/>
      <stop offset="100%" stop-color="#FF3D8A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="800" height="400" fill="url(#bg2)"/>

  <!-- subtle grid -->
  <g stroke="rgba(255,255,255,0.08)" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- floating "design token" shapes -->
  <rect x="90" y="240" width="120" height="90" rx="18" fill="#FF3D8A"/>
  <circle cx="330" cy="120" r="58" fill="#FFFFFF"/>
  <rect x="430" y="60" width="150" height="150" rx="24" fill="#B7A6F2" opacity="0.9"/>
  <circle cx="640" cy="290" r="70" fill="#FF8FBE"/>
  <rect x="560" y="150" width="90" height="90" rx="16" fill="#FFFFFF" opacity="0.85" transform="rotate(12 605 195)"/>
  <circle cx="150" cy="90" r="30" fill="#FFFFFF" opacity="0.6"/>
  <rect x="230" y="260" width="70" height="70" rx="14" fill="#3C3489"/>

  <!-- connecting lines suggesting a system -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="210" y1="285" x2="330" y2="178"/>
    <line x1="388" y1="120" x2="430" y2="120"/>
    <line x1="580" y1="135" x2="605" y2="150"/>
    <line x1="605" y1="240" x2="640" y2="255"/>
  </g>

  <!-- small accent dots -->
  <circle cx="270" cy="60" r="6" fill="#FFFFFF"/>
  <circle cx="710" cy="100" r="8" fill="#FF3D8A"/>
  <circle cx="60" cy="340" r="7" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="500" cy="340" r="5" fill="#FFFFFF" opacity="0.6"/>

  <rect x="0" y="0" width="800" height="400" fill="url(#pinkfade)" opacity="0.12"/>
</svg>
